{% extends 'base.html' %}

{% block content %}
<h2>Perfil do Usuário</h2>

<div style="border: 1px solid #ccc; padding: 20px; width: 400px;">
    <strong>Nome:</strong>
        
        <form id="form-nome" action="/perfil/editar-nome" method="post" style="display:inline;">
    
        <span id="nome-texto">{{ usuario.nome }}</span>
    
        <input type="text" id="nome-input" name="nome" value="{{ usuario.nome }}" 
           style="display:none;" required>

        <button type="button" id="btn-editar" onclick="editarNome()">Editar</button>
        <button type="submit" id="btn-salvar" style="display:none;">Salvar</button>

    </form>
    <p><strong>Email:</strong> {{ usuario.email }}</p>
    <p><strong>Confirmado:</strong> {{ 'Sim' if usuario.confirmado else 'Não' }}</p>
</div>

<br><br>
<a href="/" style="text-decoration:none;">
    <button>Voltar</button>
</a>

<script>
function editarNome() {
    document.getElementById('nome-texto').style.display = 'none';
    document.getElementById('nome-input').style.display = 'inline';
    document.getElementById('btn-editar').style.display = 'none';
    document.getElementById('btn-salvar').style.display = 'inline';
}
</script>
{% endblock %}
