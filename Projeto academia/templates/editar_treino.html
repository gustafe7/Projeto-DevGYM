{% extends 'base.html' %}

{% block content %}

<h2>Editar Treino</h2>

<form method="post" style="max-width: 400px;">
    <label>Nome do treino:</label>
    <input type="text" name="nome" value="{{ treino.nome }}" required>

    <label style="margin-top: 12px;">Dia da semana:</label>
    <input type="text" name="dia_semana" value="{{ treino.dia_semana }}" required>

    <button type="submit" style="margin-top: 8px;">Salvar alterações</button>
</form>

<div style="margin-top: 16px;">
    <a href="/"><button>Voltar</button></a>
</div>

{% endblock %}
