{% extends 'base.html' %}

{% block content %}

<h2>Editar Treino</h2>

<form method="post">
    <label>Nome do treino:</label><br>
    <input type="text" name="nome" value="{{ treino.nome }}" required><br><br>

    <label>Dia da semana:</label><br>
    <input type="text" name="dia_semana" value="{{ treino.dia_semana }}" required><br><br>

    <button type="submit">Salvar alterações</button>
</form>

<br>

<a href="/">
    <button>Voltar</button>
</a>

{% endblock %}
