<!DOCTYPE html>
<html>
<head>
    <title>DEVGYM</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="login-container">
    <h1>DEVGYM</h1>

    <form action="/login" method="post">
        <input type="email" name="email" placeholder="E-mail" autocomplete="username">
        <input type="password" name="senha" placeholder="Senha" autocomplete="current-password">
        <button type="submit">Entrar</button>
    </form>

    <hr class="login-divider">

    <p style="color: #aaa; font-size: 14px; margin-bottom: 12px;">Não tem conta? Cadastre-se:</p>

    <form action="/cadastro" method="post">
        <input type="text" name="nome" placeholder="Nome" required autocomplete="nome">
        <input type="email" name="email" placeholder="E-mail" required autocomplete="new-email">
        <input type="password" name="senha" placeholder="Senha" required autocomplete="new-password">
        <input type="password" name="senha_confirm" placeholder="Confirme a senha" required autocomplete="new-password">
        <button type="submit">Registrar</button>
        <p style="margin-top: 8px;"><a href="/recuperar-senha">Esqueceu a senha?</a></p>
    </form>

    {% if erro %}
        <p class="msg-erro">{{ erro }}</p>
    {% endif %}

    {% if sucesso %}
        <p class="msg-sucesso">Cadastro realizado com sucesso!</p>
        <p style="color: #aaa; font-size: 14px;">Você receberá um link para confirmar o seu e-mail.</p>
    {% endif %}
</div>

</body>
</html>
